  s+="### ANALISI VISIVA\nQuando l'utente invia foto, analizza in dettaglio: postura, composizione corporea, tecnica di esecuzione, squilibri e asimmetrie. Dai feedback costruttivo e pratico.\n";
  s+="### MEMORIA E TRACKING\nHai accesso ai dati storici dell'utente. Usali per consigli personalizzati.\n\n";

  if(prog){s+="## STORICO PROGRESSI\n"+JSON.stringify(prog,null,2)+"\n\n";}
  s+="## COMPITO\nSe hai gia il profilo, USALO. Non ri-chiedere dati che hai gia. Se NON hai il profilo, conduci l'intervista completa (antropometria, storia allenamento, obiettivi, disponibilita, salute, nutrizione) per creare una scheda personalizzata.\n\n";
  s+="## ESTRAZIONE DATI\nQuando acquisisci nuovi dati dall'utente, aggiungi alla FINE della risposta:\n<PROFILE_UPDATE>{\"campo\":\"valore\"}</PROFILE_UPDATE>\n";
  s+="Campi: nome, eta, sesso, altezza_cm, peso_kg, grasso_percentuale, somatotipo, stile_vita, esperienza_allenamento, anni_allenamento, tipo_allenamento, frequenza_settimanale, massimali, obiettivo_primario, obiettivo_secondario, timeline, gruppi_carenti, giorni_disponibili, tempo_sessione, luogo_allenamento, attrezzatura, preferenze, infortuni, dolori, postura, patologie, allergie, nutrizione_attuale, pasti_giorno, note\n\n";

function formatText(text){
  return text.split("\n").map(function(line,i){
    if(line.startsWith("### "))return h("h4",{key:i,style:{fontSize:14,fontWeight:600,color:"#ccc",margin:"8px 0 4px"}},line.slice(4));
    if(line.startsWith("## "))return h("h3",{key:i,style:{fontSize:15,fontWeight:600,color:"#fff",margin:"10px 0 4px"}},line.slice(3));
    if(line.startsWith("# "))return h("h2",{key:i,style:{fontSize:17,fontWeight:700,color:"#E8FF59",margin:"12px 0 6px"}},line.slice(2));
    var parts=[];var last=0;var rx=/\*\*(.*?)\*\*/g;var m;
    while((m=rx.exec(line))!==null){if(m.index>last)parts.push(line.slice(last,m.index));parts.push(h("strong",{key:"b"+i+"-"+m.index,style:{color:"#E8FF59"}},m[1]));last=m.index+m[0].length;}
    if(last<line.length)parts.push(line.slice(last));
    if(line.startsWith("- "))return h("div",{key:i,style:{display:"flex",gap:8,margin:"3px 0",paddingLeft:4}},h("span",{style:{color:"#E8FF59",fontWeight:700}},"\u25B8"),h("span",null,parts.length>1?parts:line.slice(2)));
    if(/^\d+\.\s/.test(line)){var num=line.match(/^(\d+)\./)[1];return h("div",{key:i,style:{display:"flex",gap:8,margin:"3px 0",paddingLeft:4}},h("span",{style:{color:"#E8FF59",fontWeight:600,minWidth:20}},num+"."),h("span",null,parts.length>1?parts:line.replace(/^\d+\.\s/,"")));}
    if(!line.trim())return h("div",{key:i,style:{height:8}});
    return h("p",{key:i,style:{margin:"2px 0"}},parts.length>1?parts:line);
  });
}

function App(){
  var _v=useState("loading"),view=_v[0],setView=_v[1];
  var _ak=useState(""),apiKey=_ak[0],setApiKey=_ak[1];
  var _sk=useState(false),showKey=_sk[0],setShowKey=_sk[1];
  var _tk=useState(""),tempKey=_tk[0],setTempKey=_tk[1];
  var _pr=useState(null),profile=_pr[0],setProfile=_pr[1];
  var _ss=useState([]),sessions=_ss[0],setSessions=_ss[1];
  var _pg=useState([]),progress=_pg[0],setProgress=_pg[1];
  var _ai=useState(null),activeId=_ai[0],setActiveId=_ai[1];
  var _ms=useState([]),messages=_ms[0],setMessages=_ms[1];
  var _in=useState(""),input=_in[0],setInput=_in[1];
  var _ld=useState(false),loading=_ld[0],setLoading=_ld[1];
  var _st=useState(""),status=_st[0],setStatus=_st[1];
  var _ip=useState(null),imgPrev=_ip[0],setImgPrev=_ip[1];
  var _id=useState(null),imgData=_id[0],setImgData=_id[1];
  var _pf=useState({peso:"",note:""}),pForm=_pf[0],setPForm=_pf[1];
  var endRef=useRef(null);var inpRef=useRef(null);var fileRef=useRef(null);var histRef=useRef([]);

  useEffect(function(){
    var k=DB.get("apiKey"),p=DB.get("profile"),s=DB.get("sessions")||[],pr=DB.get("progress")||[];
    setApiKey(k||"");setTempKey(k||"");setProfile(p);setSessions(s);setProgress(pr);
    setView(k?"dashboard":"setup");
  },[]);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[messages,loading]);

  function doSaveProfile(u){var mg=Object.assign({},profile||{},u,{ultimo_aggiornamento:new Date().toISOString()});setProfile(mg);DB.set("profile",mg);}
  function doSaveSession(id,msgs,title){DB.set("session_"+id,msgs);var up=sessions.filter(function(s){return s.id!==id});up.unshift({id:id,title:title||"Sessione "+new Date().toLocaleDateString("it-IT"),date:new Date().toISOString(),messageCount:msgs.length});setSessions(up);DB.set("sessions",up);}
  function doDeleteSession(id){DB.del("session_"+id);var up=sessions.filter(function(s){return s.id!==id});setSessions(up);DB.set("sessions",up);}
  function doAddProgress(e){var up=progress.concat([Object.assign({},e,{data:new Date().toISOString()})]);setProgress(up);DB.set("progress",up);}

  function extractProfile(text){
    var match=text.match(/<PROFILE_UPDATE>([\s\S]*?)<\/PROFILE_UPDATE>/);
    if(match){try{doSaveProfile(JSON.parse(match[1]))}catch(e){}}
    return text.replace(/<PROFILE_UPDATE>[\s\S]*?<\/PROFILE_UPDATE>/g,"").trim();
  }

  function tryModel(model,body){
    var url="https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey;
    return fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
    .then(function(res){
      if(!res.ok){
        return res.json().catch(function(){return{}}).then(function(err){
          var errMsg=(err.error&&err.error.message)||"Errore sconosciuto";
          var isOverloaded=res.status===429||res.status===503||errMsg.indexOf("high demand")!==-1||errMsg.indexOf("overloaded")!==-1||errMsg.indexOf("RESOURCE_EXHAUSTED")!==-1;
          return{ok:false,overloaded:isOverloaded,errMsg:errMsg};
        });
      }
      return res.json().then(function(data){return{ok:true,data:data}});
    });
  }

  function parseResponse(result){
    if(!result.data||!result.data.candidates||!result.data.candidates[0])return{text:"\u26A0\uFE0F Risposta vuota. Riprova.",su:false};
    var candidate=result.data.candidates[0];
    var text="";
    if(candidate.content&&candidate.content.parts){
      text=candidate.content.parts.filter(function(p){return p.text}).map(function(p){return p.text}).join("\n");
    }
    if(!text)text="Errore nella risposta.";
    var su=false;
    if(candidate.groundingMetadata){
      if(candidate.groundingMetadata.searchEntryPoint)su=true;
      if(candidate.groundingMetadata.groundingChunks&&candidate.groundingMetadata.groundingChunks.length>0)su=true;
    }
    text=extractProfile(text);
    return{text:text,su:su};
  }

  var MODELS=["gemini-2.5-flash","gemini-2.5-flash-lite","gemini-2.0-flash"];

  function callAPI(userParts){
    histRef.current.push({role:"user",parts:userParts});
    setStatus("Sto elaborando...");
    var contents=histRef.current.map(function(m){return{role:m.role,parts:m.parts}});
    var body={
      contents:contents,
      systemInstruction:{parts:[{text:buildSysPrompt(profile,progress.length>0?progress.slice(-10):null)}]},
      tools:[{googleSearch:{}}],
      generationConfig:{maxOutputTokens:4096,temperature:0.8}
    };
    return tryModel(MODELS[0],body).then(function(r1){
      if(r1.ok){setStatus("");var p=parseResponse(r1);histRef.current.push({role:"model",parts:[{text:p.text}]});return p;}
      if(!r1.overloaded){setStatus("");return{text:"\u26A0\uFE0F Errore API: "+r1.errMsg,su:false};}
      setStatus("\u26A1 Flash occupato, provo Flash-Lite...");
      return tryModel(MODELS[1],body).then(function(r2){
        if(r2.ok){setStatus("");var p=parseResponse(r2);histRef.current.push({role:"model",parts:[{text:p.text}]});return p;}
        if(!r2.overloaded){setStatus("");return{text:"\u26A0\uFE0F Errore API: "+r2.errMsg,su:false};}
        setStatus("\u26A1 Anche Lite occupato, provo 2.0 Flash...");
        return tryModel(MODELS[2],body).then(function(r3){
          if(r3.ok){setStatus("");var p=parseResponse(r3);histRef.current.push({role:"model",parts:[{text:p.text}]});return p;}
          setStatus("");
          return{text:"\u26A0\uFE0F Tutti i modelli sono sovraccarichi. Riprova tra qualche minuto.",su:false};
        });
      });
    })
    .catch(function(e){
      setStatus("");
      return{text:"\u26A0\uFE0F Errore: "+e.message,su:false};
    });
  }

    var id="s_"+Date.now();
    setActiveId(id);histRef.current=[];setMessages([]);setView("chat");setLoading(true);
    var g=profile?"Ciao Coach! Sono tornato. Hai il mio profilo salvato, partiamo.":"Ciao Coach! Sono pronto. Fammi tutte le domande per la mia scheda perfetta.";
    callAPI([{text:g}]).then(function(reply){
      var msgs=[{role:"assistant",content:reply.text,su:reply.su}];
      setMessages(msgs);
      doSaveSession(id,msgs,"Sessione "+new Date().toLocaleDateString("it-IT")+" "+new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}));
      setLoading(false);
      setTimeout(function(){if(inpRef.current)inpRef.current.focus()},100);
    });
  }

  function loadSess(id){
    var msgs=DB.get("session_"+id);if(!msgs)return;
    setActiveId(id);
    histRef.current=msgs.map(function(m){return{role:m.role==="user"?"user":"model",parts:[{text:m.content||""}]}});
    setMessages(msgs);setView("chat");
    setTimeout(function(){if(inpRef.current)inpRef.current.focus()},100);
  }

  function toB64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1])};r.onerror=rej;r.readAsDataURL(file)})}

  function onFileUpload(e){
    var file=e.target.files&&e.target.files[0];if(!file)return;
    if(["image/jpeg","image/png","image/gif","image/webp"].indexOf(file.type)===-1){alert("Formato non supportato.");return;}
    if(file.size>15*1024*1024){alert("Max 15MB.");return;}
    toB64(file).then(function(b64){setImgData({base64:b64,mt:file.type});setImgPrev(URL.createObjectURL(file))}).catch(function(){});
    e.target.value="";
  }

  function sendMsg(){
    var text=input.trim();
    if((!text&&!imgData)||loading)return;
    var userParts=[];
    var dm={role:"user",content:text||"",image:imgPrev||null};
    if(imgData){

    }else{
      userParts.push({text:text});
    }
    setInput("");setImgPrev(null);setImgData(null);
    var newM=messages.concat([dm]);setMessages(newM);setLoading(true);
    callAPI(userParts).then(function(reply){
      var finalM=newM.concat([{role:"assistant",content:reply.text,su:reply.su}]);
      setMessages(finalM);doSaveSession(activeId,finalM);
      setLoading(false);
      setTimeout(function(){if(inpRef.current)inpRef.current.focus()},100);
    });
  }

  // === VIEWS ===

  if(view==="setup")return h("div",{style:{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Space Grotesk',sans-serif"}},
